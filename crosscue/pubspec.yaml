name: crosscue
description: A modern native crossword solver for iOS and Android.
publish_to: 'none'

version: 1.3.3+10303

environment:
  # Drift 2.31+ already requires Dart 3.5, so this is the real supported floor.
  # Keep the floor below Dart 3.10 until the deferred major upgrades below are
  # intentionally taken together.
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.2

  # Immutable data classes
  freezed_annotation: ^3.1.0

  # Navigation
  go_router: ^17.0.0

  # Local persistence
  # On the sqlite3 3.x line (taken with the Flutter 3.44 toolchain bump, #128).
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # HTTP client (Crosshare downloader)
  dio: ^5.4.0

  # File I/O
  # 11.0.2 includes the Android path-traversal fix and remains Dart 3.4+.
  file_picker: ^11.0.2
  # Deferred at 12.x: 13.x requires Dart 3.10 / Flutter 3.38.1 and conflicts
  # with file_picker 11 through incompatible win32 constraints.
  share_plus: ^12.0.0

  # Puzzle ID generation
  crypto: ^3.0.0

  # @immutable et al. in domain models (which must not import Flutter)
  meta: ^1.16.0

  # Challenge Boards auth token at rest (Keychain / Android Keystore-backed)
  flutter_secure_storage: ^9.2.0

  # Date formatting (streak date strings, .ipuz date parsing)
  intl: ^0.20.0

  # Material You dynamic color
  dynamic_color: ^1.7.0

  # Confetti on puzzle completion
  confetti: ^0.8.0

  # Haptics
  vibration: ^3.0.0

  # In-app feedback beep (generated PCM)
  audioplayers: ^6.6.0

  # Privacy policy / repo links opened in external browser
  url_launcher: ^6.3.2

  # Runtime app version (Settings → About)
  # Deferred at 9.x: 10.x requires Dart 3.10 / Flutter 3.38.1 and conflicts
  # with file_picker 11 through incompatible win32 constraints.
  package_info_plus: ^9.0.0
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0

  # Home/Lock-screen widget bridge (pushes state to the iOS App Group container
  # read by the WidgetKit extension). See docs/architecture/ios-widget-setup.md.
  home_widget: ^0.7.0

  # Best-effort daily background refresh of the home-screen widget (#175):
  # iOS BGAppRefreshTask + Android WorkManager via one Dart callback. See
  # lib/core/background/widget_refresh_scheduler.dart.
  workmanager: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # End-to-end integration testing on real simulators / devices.
  # See integration_test/ for the test suite and docs/qa/ios-release-checklist.md
  # for the manual QA checklist these tests gradually subsume.
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.0
  freezed: ^3.2.5
  drift_dev: ^2.33.0
  # drift_dev 2.33 requires analyzer ^12, which currently only riverpod_generator
  # 4.0.4-dev.x supports — so pub resolves this codegen tool to a prerelease.
  # This is a build-time dev_dependency only: the shipped app stays on stable
  # flutter_riverpod / riverpod_annotation. Pin back to a stable line once
  # riverpod_generator cuts an analyzer-12 release.
  riverpod_generator: ^4.0.3

  # Direct sqlite3 access in migration tests (transitive via drift_dev but must
  # be declared explicitly to satisfy depend_on_referenced_packages lint).
  sqlite3: ^3.3.2

  # Drives the elapsed-notifier timer tests under a fake clock so we can
  # assert "3s passed and SolveNotifier.state didn't tick" without sleeping.
  # Transitive via test_api but declared explicitly to satisfy the
  # depend_on_referenced_packages lint.
  fake_async: ^1.3.1

  # Linting
  flutter_lints: ^6.0.0
  http: ^1.6.0

flutter:
  uses-material-design: true

  # Roboto Mono for grid cell letters (Apache 2.0)
  fonts:
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/
    - assets/images/ic_launcher.png
