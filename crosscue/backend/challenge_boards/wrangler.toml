name = "crosscue-challenge-boards"
main = "src/index.ts"
compatibility_date = "2026-06-01"

[vars]
APP_ENV = "local"
# Host that serves invite links (Cloudflare Pages project `crosscue`). If that
# project name is ever taken/renamed, update PUBLIC_APP_URL in all three envs.
PUBLIC_APP_URL = "https://crosscue.pages.dev"
# Force-upgrade lever (#256): set to reject clients below this version with a
# structured 426 client_too_old (the app shows "update Crosscue" on the
# Challenge tab). Unset = no enforcement. WARNING: enabling it also cuts off
# app versions that predate the X-Crosscue-Client header (< v1.4.3) — that is
# the intended lever; enable per env by adding MIN_SUPPORTED_CLIENT to its
# vars, staging first.
# MIN_SUPPORTED_CLIENT = "1.4.3"

# Workers Logs/Traces (#159 workstream E4). Logs are structured JSON and never
# include tokens, recovery/invite secrets, or full invite URLs.
[observability]
enabled = true

# Daily UTC board_events retention purge (#159 workstream C).
[triggers]
crons = ["7 3 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "crosscue_challenge_boards_local"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

# Abuse-dampening rate limits (#159 workstream D). RL_IDENTITY is keyed by IP
# for anonymous player creation; RL_WRITE is keyed by player id for board writes.
[[unsafe.bindings]]
name = "RL_IDENTITY"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 15, period = 60 }

[[unsafe.bindings]]
name = "RL_WRITE"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

[env.staging]
name = "crosscue-challenge-boards-staging"
vars = { APP_ENV = "staging", PUBLIC_APP_URL = "https://crosscue.pages.dev" }

[env.staging.observability]
enabled = true

[env.staging.triggers]
crons = ["7 3 * * *"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "crosscue_challenge_boards_staging"
database_id = "5160f9a9-af83-441c-b2a4-beae0a7e7f84"
migrations_dir = "migrations"

[[env.staging.unsafe.bindings]]
name = "RL_IDENTITY"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 15, period = 60 }

[[env.staging.unsafe.bindings]]
name = "RL_WRITE"
type = "ratelimit"
namespace_id = "2002"
simple = { limit = 60, period = 60 }

[env.production]
name = "crosscue-challenge-boards"
vars = { APP_ENV = "production", PUBLIC_APP_URL = "https://crosscue.pages.dev" }
# Custom domain (#159 workstream E2). Requires the crosscue.app zone in this
# Cloudflare account — the apex was never registered, so this stays commented
# out. Uncomment to serve the API on api.crosscue.app if/when the domain is
# added; until then the Worker is reachable at its *.workers.dev URL. Invite
# links are generated on crosscue.pages.dev/join/... today (Cloudflare Pages);
# crosscue.app/join/... links remain accepted and can take over later.
# routes = [{ pattern = "api.crosscue.app", custom_domain = true }]

[env.production.observability]
enabled = true

[env.production.triggers]
crons = ["7 3 * * *"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "crosscue_challenge_boards_prod"
database_id = "c4304b19-54c9-438a-bf89-d77936fc29be"
migrations_dir = "migrations"

[[env.production.unsafe.bindings]]
name = "RL_IDENTITY"
type = "ratelimit"
namespace_id = "3001"
simple = { limit = 15, period = 60 }

[[env.production.unsafe.bindings]]
name = "RL_WRITE"
type = "ratelimit"
namespace_id = "3002"
simple = { limit = 60, period = 60 }
