name: Integration tests (Android)

# Costly (boots an Android emulator under KVM), so this is opt-in: run it
# manually from the Actions tab before a release, or after large solve/UI
# changes. Not part of the per-PR CI gate. Mirrors integration-test-ios.yml.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.44.0' # matches ci.yml

jobs:
  integration-test:
    name: Android integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        working-directory: crosscue
        run: flutter pub get

      # The android-emulator-runner needs hardware acceleration; ubuntu-latest
      # has KVM but it must be made accessible to the runner user.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration suite on an emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          # Headless emulator tuned for CI throughput.
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash scripts/run-android-integration-tests.sh

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-integration-screenshots
          path: design/qa/android-*/
          if-no-files-found: ignore
