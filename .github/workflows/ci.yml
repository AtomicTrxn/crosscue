name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Toolchain pinned to match release.yml (#128 / #216). The built-in-Kotlin
  # migration (a 3.44 change) is deferred: it's only required at AGP 9.0+ and
  # we're on AGP 8.11.1, so KGP keeps working. See flutter/flutter#184837.
  FLUTTER_VERSION: '3.44.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        working-directory: .
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- \
            crosscue .github/workflows Makefile scripts; then
            echo "app=false" >> "$GITHUB_OUTPUT"
          else
            echo "app=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        if: steps.changes.outputs.app == 'true'
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        if: steps.changes.outputs.app == 'true'
        run: flutter pub get

      - name: Verify formatting
        if: steps.changes.outputs.app == 'true'
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        if: steps.changes.outputs.app == 'true'
        run: flutter analyze

      - name: Verify generated files are current
        if: steps.changes.outputs.app == 'true'
        run: |
          dart run build_runner build
          git diff --exit-code

      - name: No app changes
        if: steps.changes.outputs.app != 'true'
        run: echo "No app-affecting changes; static checks not needed."

  worker-checks:
    name: Worker checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue/backend/challenge_boards

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        working-directory: .
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- \
            crosscue/backend .github/workflows; then
            echo "worker=false" >> "$GITHUB_OUTPUT"
          else
            echo "worker=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.changes.outputs.worker == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Worker tests run TypeScript directly via --experimental-strip-types
          # (Node 22.6+).
          node-version: '22'
          cache: npm
          cache-dependency-path: crosscue/backend/challenge_boards/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.worker == 'true'
        run: npm ci

      - name: Test
        if: steps.changes.outputs.worker == 'true'
        run: npm test

      - name: Typecheck
        if: steps.changes.outputs.worker == 'true'
        run: npm run typecheck

      - name: No worker changes
        if: steps.changes.outputs.worker != 'true'
        run: echo "No worker-affecting changes; worker checks not needed."

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        working-directory: .
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- \
            crosscue .github/workflows Makefile scripts; then
            echo "app=false" >> "$GITHUB_OUTPUT"
          else
            echo "app=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        if: steps.changes.outputs.app == 'true'
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        if: steps.changes.outputs.app == 'true'
        run: flutter pub get

      - name: Test
        if: steps.changes.outputs.app == 'true'
        run: flutter test

      - name: No app changes
        if: steps.changes.outputs.app != 'true'
        run: echo "No app-affecting changes; tests not needed."
