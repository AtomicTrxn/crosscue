name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Toolchain pinned to match release.yml (#128 / #216). The built-in-Kotlin
  # migration (a 3.44 change) is deferred: it's only required at AGP 9.0+ and
  # we're on AGP 8.11.1, so KGP keeps working. See flutter/flutter#184837.
  FLUTTER_VERSION: '3.44.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        working-directory: .
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- \
            crosscue .github/workflows Makefile scripts; then
            echo "app=false" >> "$GITHUB_OUTPUT"
          else
            echo "app=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        if: steps.changes.outputs.app == 'true'
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        if: steps.changes.outputs.app == 'true'
        run: flutter pub get

      - name: Verify formatting
        if: steps.changes.outputs.app == 'true'
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        if: steps.changes.outputs.app == 'true'
        run: flutter analyze

      - name: Verify generated files are current
        if: steps.changes.outputs.app == 'true'
        run: |
          dart run build_runner build
          git diff --exit-code

      - name: No app changes
        if: steps.changes.outputs.app != 'true'
        run: echo "No app-affecting changes; static checks not needed."

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        working-directory: .
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- \
            crosscue .github/workflows Makefile scripts; then
            echo "app=false" >> "$GITHUB_OUTPUT"
          else
            echo "app=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        if: steps.changes.outputs.app == 'true'
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        if: steps.changes.outputs.app == 'true'
        run: flutter pub get

      - name: Test
        if: steps.changes.outputs.app == 'true'
        run: flutter test

      - name: No app changes
        if: steps.changes.outputs.app != 'true'
        run: echo "No app-affecting changes; tests not needed."
