name: Integration tests (iOS)

# Costly (macOS runner + simulator boot), so this is opt-in: run it manually
# from the Actions tab before a release, or after large solve/UI changes.
# Not part of the per-PR CI gate.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.41.9'

jobs:
  integration-test:
    name: iOS integration tests
    runs-on: macos-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration suite
        working-directory: .
        run: bash scripts/run-ios-integration-tests.sh

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-integration-screenshots
          path: design/qa/ios-*/
          if-no-files-found: ignore
