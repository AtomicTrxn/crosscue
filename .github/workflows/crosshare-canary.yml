# Crosshare scraper canary (#257).
#
# CrosshareDownloader scrapes crosshare.org HTML, and three features depend
# on it (Past puzzles, daily auto-download, Challenge Boards eligibility —
# docs/architecture/compatibility.md → "External dependency: Crosshare").
# This workflow runs the real fetch + parse against the live site weekly so
# a Crosshare markup change opens an issue before users report it.
#
# Deliberately NOT part of the per-PR gate: it depends on an external site.

name: Crosshare canary

on:
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  canary:
    name: Live Crosshare fetch + parse
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Run canary against live crosshare.org
        working-directory: crosscue
        run: |
          flutter pub get
          dart run tool/crosshare_canary.dart

      - name: Open or update the tracking issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Crosshare canary failing"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body="The scheduled live fetch+parse against crosshare.org failed — a Crosshare markup change may have broken the scraper (\`crosscue/lib/features/import/data/downloaders/crosshare_downloader.dart\`).

          Failing run: ${run_url}

          Impact and the stale-but-honest degradation policy: \`docs/architecture/compatibility.md\` → \"External dependency: Crosshare\". Affected surfaces: home Past-puzzles section, daily auto-download, Challenge Boards result eligibility."
          existing=$(gh issue list --state open --search "\"$title\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Still failing as of this run: ${run_url}"
          else
            gh issue create --title "$title" --label "bug" --label "area: infrastructure" --body "$body"
          fi
